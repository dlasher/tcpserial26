name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goarch: [386, amd64, arm, arm64]
        include:
          - goarch: arm
            goarm: "6"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true

      - name: Build
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=${{ matrix.goarch }} GOARM=${{ matrix.goarm }} \
          CGO_ENABLED=0 \
          go build -ldflags "-X main.version=${GITHUB_REF_NAME#v} -X main.commit=${{ github.sha }} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
          -o dist/tcpserial_${GITHUB_REF_NAME}_linux_${{ matrix.goarch }} ./cmd/tcpserial

      - name: Archive
        run: |
          cd dist
          tar czf tcpserial_${GITHUB_REF_NAME}_linux_${{ matrix.goarch }}.tar.gz \
            tcpserial_${GITHUB_REF_NAME}_linux_${{ matrix.goarch }}

      - uses: actions/upload-artifact@v4
        with:
          name: tcpserial_linux_${{ matrix.goarch }}
          path: dist/*.tar.gz

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
          generate_release_notes: true
